name: Build and push and deploy
on:
  push:
    branches:
      - 'main'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_prod:
        description: 'Deploy to production'
        required: true
        type: boolean
        default: false

jobs:
  build_and_push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      image: ${{ steps.docker-build-push.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Cache SonarCloud packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Build and analyze
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B verify -Pcoverage org.sonarsource.scanner.maven:sonar-maven-plugin:sonar


      - name: Push Docker image to GAR
        if: github.event_name != 'pull_request' && github.ref_name == 'main'
        uses: nais/docker-build-push@05dbb6091b30bd84279c6d64a45ef8782fd410a5
        id: docker-build-push
        with:
          team: team-oebs


  deploy-q1:
    name: Deploy to NAIS (Q1)
    needs: [ build_and_push]
    if: github.event_name != 'pull_request' && github.ref_name == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - uses: nais/deploy/actions/deploy@5fdd91aaf69bb0d6dd5e5118cdacb639f487b93b
        env:
          CLUSTER: dev-fss
          RESOURCE: .nais/nais-q1.yaml
          VAR: image=${{ needs.build_and_push.outputs.image }}

  deploy-prod:
    name: Deploy to NAIS produksjon
    needs: [ build_and_push, deploy-q1 ]
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_prod == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: prod
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - uses: nais/deploy/actions/deploy@5fdd91aaf69bb0d6dd5e5118cdacb639f487b93b
        env:
          CLUSTER: prod-fss
          RESOURCE: .nais/nais-p.yaml
          VAR: image=${{ needs.build_and_push.outputs.image }}
