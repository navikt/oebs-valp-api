
server:
  port: 8080

spring:
  application:
    name: oebs-po-ap-api
  datasource:
    driver-class-name: oracle.jdbc.OracleDriver
    username: username
    password: password
    url: jdbc:oracle:thin:@//localhost:1521/placeholder
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        temp:
        use__jdbc_metadata_defaults: false
        dialect: org.hibernate.dialect.OracleDialect
    show-sql: false
    open-in-view: false

oebs:
  environment: mock
  version: 1.0.0
  date: 01.06.2026

token:
  identityProvider: azuread
  target: api://dev-gcp.team-mulighetsrommet.tiltaksokonomi/.default

tiltaksokonomi:
  base.url: https://mulighetsrommet-tiltaksokonomi.intern.dev.nav.no
  faktura.endpoint.url: /api/v1/okonomi/kvittering/faktura
  bestilling.endpoint.url: /api/v1/okonomi/kvittering/bestilling

scheduled:
  time.faktura: 0 */10 * * * *
  time.bestilling: 0 */5 * * * *

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics

springdoc:
  packagesToScan: no.nav.oebs.po_ap.api
  override-with-generic-response: false
  remove-broken-reference-definitions: false
  swagger-ui:
    disable-swagger-default-url: true
    tags-sorter: alpha

nais-token-endpoint: empty
