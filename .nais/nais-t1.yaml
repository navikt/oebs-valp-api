apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: oebs-valp-api-t1
  namespace: team-oebs
  labels:
    team: team-oebs
spec:
  image: {{ image }}
  port: 8080
  replicas:
    min: 1
    max: 1
    cpuThresholdPercentage: 50
  liveness:
    path: /internal/isalive
    initialDelay: 60
    timeout: 10
  readiness:
    path: /internal/isready
    initialDelay: 60
    timeout: 10
  resources:
    requests:
      cpu: 400m
      memory: 1024Mi
    limits:
      cpu: 4000m
      memory: 2048Mi
  azure:
    application:
      enabled: true
      allowAllUsers: false
      claims:
        groups:
          - id: "d6a9b16c-d8c6-48de-9b16-b6a814e60e1a"
      # tenant: trygdeetaten.no
  accessPolicy:
    inbound:
      rules:
        - application: oebs-fullmakt-dev


        # - application: app-b
        #   namespace: other-namespace

        - application: tiltaksokonomi
          namespace: team-mulighetsrommet
          cluster: dev-gcp

  prometheus:
    enabled: true
    path: /actuator/prometheus
  vault:
    enabled: true
    paths:
      - kvPath: "kv/preprod/fss/oebs-valp-api-t1/team-oebs"
        mountPath: "/var/run/secrets/nais.io/vault"

  ingresses:
     - "https://oebs-valp-api-t1.intern.dev.nav.no"
     - "https://oebs-valp-api-t1.dev-fss-pub.nais.io"