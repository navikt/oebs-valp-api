apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  annotations:
    texas.nais.io/enabled: "true"
  name: oebs-po-ap-api-t1
  namespace: team-oebs
  labels:
    team: team-oebs
spec:
  image: {{ image }}
  port: 8080
  replicas:
    min: 1
    max: 1
    cpuThresholdPercentage: 50
  liveness:
    path: /internal/isalive
    initialDelay: 60
    timeout: 10
  readiness:
    path: /internal/isready
    initialDelay: 60
    timeout: 10
  resources:
    requests:
      cpu: 120m
      memory: 416Mi
    limits:
      memory: 512Mi
  azure:
    application:
      enabled: true
      tenant: trygdeetaten.no

  accessPolicy:
    inbound:
      rules:
        - application: oebs-fullmakt-dev
        - application: tiltaksokonomi
          namespace: team-mulighetsrommet
          cluster: dev-gcp

  prometheus:
    enabled: true
    path: /actuator/prometheus
  vault:
    enabled: true
    paths:
      - kvPath: "kv/preprod/fss/oebs-po-ap-api-t1/team-oebs"
        mountPath: "/var/run/secrets/nais.io/vault"

  ingresses:
     - "https://oebs-po-ap-api-t1.intern.dev.nav.no"
     - "https://oebs-po-ap-api-t1.dev-fss-pub.nais.io"